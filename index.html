<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Mortality Analytics | Death Causes Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="data.css">
</head>
<body>
  <aside class="sidebar">
    <div class="logo-area">
      <i class="fas fa-heartbeat"></i>
      <span>MortalityIQ</span>
    </div>
    <nav class="nav-links">
      <div class="nav-item active" data-section="dashboard">
        <i class="fas fa-tachometer-alt"></i> 
        <span>Dashboard</span>
      </div>
      <div class="nav-item" data-section="analytics">
        <i class="fas fa-chart-line"></i> 
        <span>Trends</span>
      </div>
      <div class="nav-item" data-section="reports">
        <i class="fas fa-table"></i> 
        <span>Mortality Data</span>
      </div>
      <div class="nav-item" data-section="settings">
        <i class="fas fa-cog"></i> 
        <span>Settings</span>
      </div>
    </nav>
    <div class="export-sidebar">
      <div class="nav-item" id="exportSideBtn">
        <i class="fas fa-download"></i> 
        <span>Export Data</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="top-bar">
      <div class="page-title">
        <h1><i class="fas fa-skull" style="color:#ef4444;"></i> Global Death Causes Overview</h1>
      </div>
      <div class="date-badge">
        <i class="far fa-calendar-alt"></i> 
        <span id="currentDate"></span>
      </div>
    </div>

    <div class="stats-grid" id="statsContainer"></div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="card-header">
          <h2><i class="fas fa-chart-bar" style="color:#ef4444;"></i> Deaths by Cause (2024)</h2>
          <i class="fas fa-ellipsis-h" style="color:#94a3b8;"></i>
        </div>
        <div class="canvas-container">
          <canvas id="causesBarChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="card-header">
          <h2><i class="fas fa-chart-pie" style="color:#f59e0b;"></i> Mortality Distribution</h2>
          <i class="fas fa-ellipsis-h" style="color:#94a3b8;"></i>
        </div>
        <div class="canvas-container">
          <canvas id="mortalityPieChart"></canvas>
        </div>
      </div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="card-header">
          <h2><i class="fas fa-chart-line" style="color:#8b5cf6;"></i> 5-Year Trend Comparison</h2>
          <i class="fas fa-ellipsis-h" style="color:#94a3b8;"></i>
        </div>
        <div class="canvas-container">
          <canvas id="trendLineChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="card-header">
          <h2><i class="fas fa-globe-americas" style="color:#10b981;"></i> Deaths by Region</h2>
          <i class="fas fa-ellipsis-h" style="color:#94a3b8;"></i>
        </div>
        <div class="canvas-container">
          <canvas id="regionChart"></canvas>
        </div>
      </div>
    </div>

    <div class="reports-section">
      <div class="section-header">
        <h2><i class="fas fa-file-medical-alt" style="color:#ef4444;"></i> Recent Mortality Records</h2>
        <div class="export-buttons">
          <button class="export-btn" id="exportCSVBtn">
            <i class="fas fa-file-csv"></i> Export CSV
          </button>
          <button class="primary-btn" id="exportExcelBtn">
            <i class="fas fa-file-excel"></i> Export Excel
          </button>
        </div>
      </div>
      <div class="table-container">
        <table id="reportTable">
          <thead>
            <tr>
              <th>Cause of Death</th>
              <th>ICD-10 Code</th>
              <th>Annual Deaths</th>
              <th>% of Total</th>
              <th>Trend</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
